kind = "web"
previewPath = "/"
title = "Monthly Habit Tracker"
version = "1.0.0"
id = "artifacts/habit-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20387

[services.development]
run = "pnpm --filter @workspace/habit-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/habit-tracker", "run", "build" ]
publicDir = "artifacts/habit-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20387"
BASE_PATH = "/"
