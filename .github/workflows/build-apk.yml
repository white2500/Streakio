name: Build Streakio APK

on:
  push:
    branches: [main]
    paths:
      - "artifacts/habit-tracker/**"
  workflow_dispatch:

jobs:
  # ── Debug APK (always built, no secrets needed) ──────────────────────────
  debug:
    name: Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @workspace/habit-tracker run build

      - name: Sync Capacitor
        working-directory: artifacts/habit-tracker
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/habit-tracker/android/**/*.gradle*', 'artifacts/habit-tracker/android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x artifacts/habit-tracker/android/gradlew

      - name: Build debug APK
        working-directory: artifacts/habit-tracker/android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: streakio-debug-${{ github.sha }}
          path: artifacts/habit-tracker/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ── Release APK (signed, Play Store ready) ───────────────────────────────
  release:
    name: Release APK (signed)
    runs-on: ubuntu-latest
    # Skips gracefully when signing secrets are not yet configured
    if: ${{ vars.ENABLE_RELEASE_BUILD == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @workspace/habit-tracker run build

      - name: Sync Capacitor
        working-directory: artifacts/habit-tracker
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/habit-tracker/android/**/*.gradle*', 'artifacts/habit-tracker/android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/streakio-release.jks

      - name: Make gradlew executable
        run: chmod +x artifacts/habit-tracker/android/gradlew

      - name: Build release APK
        working-directory: artifacts/habit-tracker/android
        env:
          KEYSTORE_PATH: /tmp/streakio-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: streakio-release-${{ github.sha }}
          path: artifacts/habit-tracker/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
